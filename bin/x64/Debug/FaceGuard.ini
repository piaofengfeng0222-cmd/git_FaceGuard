[General]
; 是否显示系统托盘图标 (1=显示, 0=隐藏)
ShowTrayIcon=1
; 是否开机自启动
AutoStart=1
; 人脸比对阈值 (LBPH 置信度, 越小越严格)
FaceMatchThreshold=70
; 定时抓拍间隔 (秒)
NormalIntervalSeconds=30
; 不匹配时抓拍间隔 (秒)
AlertIntervalSeconds=3
; 不匹配重试次数
AlertRetryCount=5
; 强制关机前等待时间 (秒)
ShutdownDelaySeconds=60

